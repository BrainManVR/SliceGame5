<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Pizza Slicer - GCSE Maths Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'ui-sans-serif', system-ui, sans-serif;
            overflow-x: hidden;
            user-select: none;
        }

        .font-space {
            font-family: 'Orbitron', sans-serif;
        }

        .starfield {
            position: absolute;
            inset: 0;
            opacity: 0.15;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .success-flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            background-color: #10b981;
            mix-blend-mode: screen;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .success-flash.active {
            opacity: 1;
        }

        /* Attention-grabbing pulse for the Next button */
        @keyframes next-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(250, 204, 21, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }

        .animate-next-call {
            animation: next-pulse 1.5s infinite ease-in-out;
            border: 4px solid #facc15 !important;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }

        .level-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: rgba(15, 23, 42, 0.95);
            border: 4px solid #22d3ee;
            padding: 2rem;
            border-radius: 2rem;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            box-shadow: 0 0 50px rgba(34, 211, 238, 0.4);
        }

        .level-popup.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .alien-bounce {
            animation: alien-bounce-anim 0.4s infinite ease-in-out;
        }

        @keyframes alien-bounce-anim {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.05); }
        }

        .flywheel-knob {
            cursor: grab;
            touch-action: none;
        }

        .flywheel-knob:active {
            cursor: grabbing;
        }

        .digital-font {
            font-family: 'Courier New', Courier, monospace;
        }

        .pizza-glow {
            filter: drop-shadow(0 0 20px rgba(234, 179, 8, 0.3));
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .angle-label-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 8px;
            fill: #1e293b;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8 relative">
    <div class="starfield"></div>
    <div id="successFlash" class="success-flash"></div>
    
    <div id="levelPopup" class="level-popup">
        <h3 class="text-cyan-400 font-space font-black text-2xl mb-2">PROMOTED!</h3>
        <p id="levelPopupText" class="text-white text-lg">You are leveling up.<br>Current level: 1</p>
    </div>

    <!-- Header Section -->
    <header class="text-center z-10 mb-8 w-full max-w-4xl">
        <h1 class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 uppercase tracking-tighter font-space italic">
            COSMIC PIZZA SLICER
        </h1>
        <div class="mt-4 flex justify-center gap-4">
            <div class="glass px-6 py-2 rounded-full">
                <p class="text-cyan-300 font-bold text-sm tracking-widest uppercase">Level: <span id="levelText" class="text-white">1</span></p>
            </div>
            <div class="glass px-6 py-2 rounded-full">
                <p class="text-fuchsia-300 font-bold text-sm tracking-widest uppercase">Streak: <span id="streakText" class="text-white">0</span></p>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-6 w-full max-w-7xl z-10 items-stretch">
        
        <!-- Left: Customer Queue -->
        <section class="glass rounded-3xl p-6 shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="text-lg font-bold text-fuchsia-400 uppercase tracking-widest font-space">The Order</h2>
                <span id="totalWeightDisplay" class="bg-fuchsia-500/20 text-fuchsia-300 px-3 py-1 rounded-lg border border-fuchsia-500/30 font-bold">0 kg</span>
            </div>
            
            <div id="customerContainer" class="space-y-4 flex-1">
                <!-- Customer Cards -->
            </div>
            
            <div id="feedbackBox" class="mt-6 hidden p-4 rounded-xl text-center font-bold border transition-all duration-300">
                <!-- Feedback -->
            </div>
        </section>

        <!-- Center: The Interstellar Pizza -->
        <section class="flex flex-col items-center justify-center p-4">
            <div id="pizzaWrapper" class="relative w-72 h-72 sm:w-80 sm:h-80 md:w-[450px] md:h-[450px] rounded-full transition-all duration-700 p-2">
                <svg id="pizzaSvg" viewBox="0 0 200 200" class="w-full h-full pizza-glow">
                    <!-- Space Crust -->
                    <circle cx="100" cy="100" r="98" fill="#334155" />
                    <circle cx="100" cy="100" r="95" fill="#ca8a04" />
                    <circle cx="100" cy="100" r="90" fill="#eab308" />
                    <!-- Neon Cheese -->
                    <circle cx="100" cy="100" r="82" fill="#fef08a" />
                    
                    <!-- Visual Toppings -->
                    <circle cx="65" cy="55" r="8" fill="#dc2626" opacity="0.8"/>
                    <circle cx="135" cy="75" r="10" fill="#dc2626" opacity="0.8"/>
                    <circle cx="95" cy="145" r="12" fill="#dc2626" opacity="0.8"/>
                    <circle cx="55" cy="125" r="7" fill="#dc2626" opacity="0.8"/>
                    <circle cx="155" cy="125" r="9" fill="#dc2626" opacity="0.8"/>
                    
                    <!-- Slicing Visualization Layer -->
                    <g id="sliceLinesGroup"></g>
                    <g id="labelsGroup"></g>
                    
                    <line id="previewLine" x1="100" y1="100" x2="100" y2="5" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="4 2" stroke-linecap="round" />
                    <circle cx="100" cy="100" r="4" fill="#0f172a" />
                </svg>
            </div>
            
            <div class="mt-8 flex gap-4">
                <div class="text-center">
                    <p class="text-[10px] uppercase text-slate-500 font-bold mb-1">Calibration Mode</p>
                    <span id="calcModeText" class="bg-slate-800 text-slate-300 border border-slate-700 px-4 py-1 rounded-md text-xs font-bold italic">Level 1: 5° Increment Logic</span>
                </div>
            </div>
        </section>

        <!-- Right: Control Deck -->
        <section class="glass rounded-3xl p-6 shadow-2xl flex flex-col items-center">
            <div class="w-full flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-cyan-400 uppercase tracking-widest font-space">Control Deck</h2>
                <span class="text-[10px] text-slate-400 font-bold uppercase">Snapping: 5°</span>
            </div>
            
            <div class="w-full bg-black/60 border-2 border-cyan-500/30 rounded-2xl p-6 text-center shadow-[inner_0_0_15px_rgba(34,211,238,0.2)] mb-8">
                <div class="text-[10px] text-cyan-500 uppercase tracking-[0.2em] mb-1 font-bold">Cutting Trajectory</div>
                <div id="angleDisplay" class="text-6xl font-black text-cyan-400 digital-font">000°</div>
            </div>

            <div id="flywheel" class="relative w-52 h-52 mb-10 select-none">
                <div class="absolute inset-0 rounded-full border-[12px] border-slate-800 bg-slate-900 shadow-xl"></div>
                <!-- 5 degree tick marks -->
                <svg class="absolute inset-0 w-full h-full opacity-20" viewBox="0 0 100 100">
                    <g id="ticks"></g>
                </svg>
                <div id="rotator" class="absolute inset-0 rounded-full">
                    <div class="absolute top-0 bottom-1/2 left-1/2 w-0.5 -ml-[0.25px] bg-cyan-400/30"></div>
                    <div id="knob" class="flywheel-knob absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-full shadow-lg border-4 border-slate-900 flex items-center justify-center hover:scale-110 transition-transform active:scale-95">
                        <div class="w-2 h-2 bg-white rounded-full"></div>
                    </div>
                </div>
            </div>

            <div class="w-full space-y-3">
                <button id="btnMakeSlice" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95 border-b-4 border-cyan-800 shadow-lg">
                    MARK CUT
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btnClear" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold py-3 rounded-xl transition-all active:scale-95 border-b-4 border-slate-900">CLEAR</button>
                    <button id="btnSliceNow" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl transition-all active:scale-95 border-b-4 border-emerald-800 shadow-lg">SLICE!</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- Game Engine State ---
        let customers = [];
        let currentAngle = 0;
        let placedLines = [0]; 
        let gameState = 'playing';
        let isDragging = false;
        
        // Progression Logic
        let currentLevel = 1;
        let winStreak = 0;
        let lossStreak = 0;

        const difficultySettings = {
            1: { name: "Apprentice", increments: [180, 90], desc: "Halves & Quarters" },
            2: { name: "Slicer", increments: [120, 60, 30], desc: "Thirds, Sixths & 30°" },
            3: { name: "Chef", increments: [45, 90, 135], desc: "Eighths (45° steps)" },
            4: { name: "Master", increments: [15, 30, 45, 75], desc: "Advanced (15° steps)" },
            5: { name: "Legend", increments: [5, 10, 20, 25, 50], desc: "Grandmaster (5° steps)" }
        };

        // --- Cache DOM ---
        const totalWeightDisplay = document.getElementById('totalWeightDisplay');
        const customerContainer = document.getElementById('customerContainer');
        const sliceLinesGroup = document.getElementById('sliceLinesGroup');
        const labelsGroup = document.getElementById('labelsGroup');
        const previewLine = document.getElementById('previewLine');
        const angleDisplay = document.getElementById('angleDisplay');
        const rotator = document.getElementById('rotator');
        const knob = document.getElementById('knob');
        const flywheel = document.getElementById('flywheel');
        const btnMakeSlice = document.getElementById('btnMakeSlice');
        const btnClear = document.getElementById('btnClear');
        const btnSliceNow = document.getElementById('btnSliceNow');
        const feedbackBox = document.getElementById('feedbackBox');
        const successFlash = document.getElementById('successFlash');
        const pizzaWrapper = document.getElementById('pizzaWrapper');
        const levelText = document.getElementById('levelText');
        const streakText = document.getElementById('streakText');
        const calcModeText = document.getElementById('calcModeText');
        const levelPopup = document.getElementById('levelPopup');
        const levelPopupText = document.getElementById('levelPopupText');

        // Draw ticks for visual help
        const ticksGroup = document.getElementById('ticks');
        for (let i = 0; i < 360; i += 15) {
            const angle = (i - 90) * Math.PI / 180;
            const x1 = 50 + 42 * Math.cos(angle);
            const y1 = 50 + 42 * Math.sin(angle);
            const x2 = 50 + 48 * Math.cos(angle);
            const y2 = 50 + 48 * Math.sin(angle);
            ticksGroup.innerHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="white" stroke-width="0.5" />`;
        }

        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        }

        function showLevelNotification(lvl, up = true) {
            levelPopupText.innerHTML = up ? `You are leveling up.<br>Current level: ${lvl}` : `Efficiency warning.<br>Descending to level: ${lvl}`;
            levelPopup.querySelector('h3').innerText = up ? "PROMOTED!" : "RE-ASSIGNED";
            levelPopup.querySelector('h3').style.color = up ? "#22d3ee" : "#f43f5e";
            levelPopup.classList.add('active');
            setTimeout(() => levelPopup.classList.remove('active'), 2500);
        }

        function generateLevel() {
            const config = difficultySettings[currentLevel];
            let remaining = 360;
            let targets = [];
            
            while (remaining > 0) {
                const available = config.increments.filter(inc => inc <= remaining);
                if (available.length === 0) {
                    targets[targets.length - 1] += remaining;
                    break;
                }
                const choice = available[Math.floor(Math.random() * available.length)];
                targets.push(choice);
                remaining -= choice;
            }

            targets = targets.sort(() => Math.random() - 0.5).slice(0, 4);
            const sum = targets.reduce((a, b) => a + b, 0);
            if (sum < 360) targets[0] += (360 - sum);

            const div = 10; 
            const emojis = ['👽', '👾', '🤖', '🐙', '👁️', '🛸', '👻'].sort(() => Math.random() - 0.5);

            return targets.map((angle, i) => ({
                id: i,
                weight: parseFloat((angle / div).toFixed(1)),
                targetAngle: angle,
                emoji: emojis[i],
                angry: false
            }));
        }

        function renderCustomers() {
            const total = customers.reduce((sum, c) => sum + c.weight, 0);
            totalWeightDisplay.innerText = `${total.toFixed(1)} kg`;
            customerContainer.innerHTML = customers.map(c => `
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border-2 ${c.angry ? 'border-red-500/50 bg-red-500/10' : 'border-white/5'} transition-all duration-300">
                    <div class="text-4xl ${c.angry ? 'alien-bounce' : ''}">${c.angry ? '😡' : c.emoji}</div>
                    <div class="flex-1">
                        <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Weight Intake</div>
                        <div class="text-2xl font-black ${c.angry ? 'text-red-400' : 'text-emerald-400'} font-space">${c.weight}kg</div>
                    </div>
                </div>
            `).join('');
        }

        function updatePizzaDisplay() {
            // 1. Draw Slice Lines
            sliceLinesGroup.innerHTML = placedLines.map(angle => {
                const pt = polarToCartesian(100, 100, 95, angle);
                const isFixed = angle === 0;
                return `<line x1="100" y1="100" x2="${pt.x}" y2="${pt.y}" stroke="${isFixed ? '#f43f5e' : '#1e293b'}" stroke-width="${isFixed ? '1.5' : '3'}" stroke-linecap="round" />`;
            }).join('');

            // 2. Calculate and Draw Sector Labels
            const sortedLines = [...placedLines].sort((a, b) => a - b);
            let labelsHtml = '';
            
            for (let i = 0; i < sortedLines.length; i++) {
                const start = sortedLines[i];
                const end = (i === sortedLines.length - 1) ? sortedLines[0] + 360 : sortedLines[i + 1];
                const diff = end - start;
                
                if (diff > 0) {
                    // Find middle angle of sector
                    const midAngle = start + (diff / 2);
                    // Place label at 65% radius
                    const pos = polarToCartesian(100, 100, 65, midAngle);
                    
                    labelsHtml += `
                        <g transform="translate(${pos.x}, ${pos.y})">
                            <rect x="-10" y="-6" width="20" height="12" rx="3" fill="rgba(255,255,255,0.8)" />
                            <text text-anchor="middle" dominant-baseline="middle" class="angle-label-text">${Math.round(diff)}°</text>
                        </g>
                    `;
                }
            }
            labelsGroup.innerHTML = labelsHtml;

            // 3. Update Preview
            const previewPt = polarToCartesian(100, 100, 95, currentAngle);
            previewLine.setAttribute('x2', previewPt.x);
            previewLine.setAttribute('y2', previewPt.y);
            previewLine.style.opacity = (gameState === 'playing') ? '1' : '0';
        }

        function updateFlywheelUI() {
            rotator.style.transform = `rotate(${currentAngle}deg)`;
            angleDisplay.innerText = `${Math.round(currentAngle).toString().padStart(3, '0')}°`;
        }

        function resetGame() {
            customers = generateLevel();
            placedLines = [0];
            currentAngle = 0;
            gameState = 'playing';
            levelText.innerText = currentLevel;
            streakText.innerText = winStreak;
            calcModeText.innerText = `Level ${currentLevel}: ${difficultySettings[currentLevel].desc}`;
            btnClear.innerText = "CLEAR";
            
            renderCustomers();
            updatePizzaDisplay();
            updateFlywheelUI();
            
            feedbackBox.classList.add('hidden');
            pizzaWrapper.style.transform = "scale(1)";
        }

        function startDrag(e) {
            if (gameState !== 'playing') return;
            isDragging = true;
            if (e.cancelable) e.preventDefault();
        }

        function handleMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = flywheel.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const x = clientX - centerX;
            const y = clientY - centerY;
            let deg = Math.atan2(y, x) * (180 / Math.PI) + 90;
            if (deg < 0) deg += 360;
            
            currentAngle = Math.round(deg / 5) * 5 % 360;
            updateFlywheelUI();
            updatePizzaDisplay();
        }

        btnMakeSlice.addEventListener('click', () => {
            if (gameState !== 'playing') return;
            if (!placedLines.includes(currentAngle)) {
                placedLines.push(currentAngle);
                updatePizzaDisplay();
            }
        });

        btnClear.addEventListener('click', () => {
            if (gameState === 'success' || gameState === 'fail') resetGame();
            else {
                placedLines = [0];
                gameState = 'playing';
                updatePizzaDisplay();
                feedbackBox.classList.add('hidden');
            }
        });

        btnSliceNow.addEventListener('click', () => {
            if (gameState !== 'playing') return;
            
            const sortedLines = [...placedLines].sort((a, b) => a - b);
            const actualSectors = [];
            for (let i = 1; i < sortedLines.length; i++) {
                actualSectors.push(sortedLines[i] - sortedLines[i - 1]);
            }
            actualSectors.push(360 - sortedLines[sortedLines.length - 1]);

            const targets = customers.map(c => c.targetAngle).sort((a, b) => a - b);
            const actuals = actualSectors.sort((a, b) => a - b);

            let isCorrect = true;
            if (targets.length !== actuals.length) isCorrect = false;
            else {
                for (let i = 0; i < targets.length; i++) {
                    if (Math.abs(targets[i] - actuals[i]) > 0.1) isCorrect = false;
                }
            }

            if (isCorrect) {
                gameState = 'success';
                winStreak++;
                lossStreak = 0;
                successFlash.classList.add('active');
                setTimeout(() => successFlash.classList.remove('active'), 500);
                
                if (winStreak >= 3 && currentLevel < 5) {
                    currentLevel++;
                    winStreak = 0;
                    showLevelNotification(currentLevel, true);
                }

                feedbackBox.innerHTML = `
                    <div class="text-emerald-400 text-lg mb-2">SECTOR MATCH CONFIRMED</div>
                    <button id="btnNext" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black py-4 rounded-xl transition-all animate-next-call">NEXT ORDER</button>
                `;
                feedbackBox.className = "mt-6 p-4 rounded-xl text-center font-bold bg-emerald-500/10 border-emerald-500/50 block";
                document.getElementById('btnNext').onclick = resetGame;
            } else {
                gameState = 'fail';
                lossStreak++;
                winStreak = 0;
                if (lossStreak >= 2 && currentLevel > 1) {
                    currentLevel--;
                    lossStreak = 0;
                    showLevelNotification(currentLevel, false);
                }
                
                customers.forEach(c => c.angry = true);
                renderCustomers();
                btnClear.innerText = "TRY AGAIN";
                feedbackBox.innerHTML = `<div class="text-red-400 text-lg mb-1 uppercase font-space">Rationing Error!</div><div class="text-xs text-red-300 italic">Slice proportions do not match orders.</div>`;
                feedbackBox.className = "mt-6 p-4 rounded-xl text-center font-bold bg-red-500/10 border-red-500/50 block";
            }
            streakText.innerText = winStreak;
        });

        knob.addEventListener('mousedown', startDrag);
        knob.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        resetGame();
    </script>
</body>
</html>
